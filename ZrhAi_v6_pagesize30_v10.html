<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZrhAi - AI Prompt Library</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #16161f;
  --bg-card-hover: #1c1c28;
  --surface: #1e1e2a;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text-primary: #e8e8ef;
  --text-secondary: #8b8b9e;
  --text-muted: #5a5a6e;
  --accent: #6c5ce7;
  --accent-glow: rgba(108,92,231,0.3);
  --accent2: #00cec9;
  --accent2-glow: rgba(0,206,201,0.2);
  --gradient-hero: linear-gradient(135deg, #6c5ce7 0%, #00cec9 50%, #fd79a8 100%);
  --radius: 14px;
  --font-main: 'Outfit', 'Noto Sans SC', sans-serif;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --danger: #e74c3c;
  --success: #27ae60;
  --warning: #f39c12;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:var(--font-main); background:var(--bg-primary); color:var(--text-primary); min-height:100vh; overflow-x:hidden; }

/* ══════ FRONT PAGE STYLES ══════ */
.page-front, .page-admin { display:none; }
.page-front.active, .page-admin.active { display:block; }

.app-wrapper { position:relative; z-index:1; }
.app-wrapper::before {
  content:''; position:fixed; inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:-1;
}

/* Navbar */
.navbar { position:sticky; top:0; z-index:100; background:rgba(10,10,15,0.82); backdrop-filter:blur(20px) saturate(1.6); border-bottom:1px solid var(--border); padding:0 24px; }
.navbar-inner { max-width:1400px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:64px; }
.nav-brand { display:flex; align-items:center; gap:10px; cursor:default; }
.nav-logo { width:36px; height:36px; background:var(--gradient-hero); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px; color:#fff; box-shadow:0 4px 20px var(--accent-glow); }
.nav-title { font-weight:700; font-size:20px; background:var(--gradient-hero); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.nav-subtitle { font-size:12px; color:var(--text-muted); font-weight:400; margin-left:2px; }
.nav-actions { display:flex; align-items:center; gap:8px; }
.lang-btn, .admin-nav-btn, .info-nav-btn { background:var(--surface); border:1px solid var(--border); color:var(--text-secondary); padding:6px 14px; border-radius:20px; font-size:13px; font-family:var(--font-main); cursor:pointer; transition:var(--transition); }
.lang-btn:hover, .lang-btn.active, .info-nav-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.admin-nav-btn { background:rgba(231,76,60,0.15); border-color:rgba(231,76,60,0.3); color:#e74c3c; }
.admin-nav-btn:hover { background:#e74c3c; color:#fff; border-color:#e74c3c; }

/* Hero */
.hero { text-align:center; padding:64px 24px 40px; position:relative; overflow:hidden; }
.hero::before { content:''; position:absolute; top:-200px; left:50%; transform:translateX(-50%); width:800px; height:600px; background:radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%); pointer-events:none; }
.hero h1 { font-size:clamp(28px,5vw,48px); font-weight:800; letter-spacing:-1px; margin-bottom:12px; position:relative; }
.gradient-text { background:var(--gradient-hero); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.hero p { font-size:clamp(14px,2vw,18px); color:var(--text-secondary); max-width:560px; margin:0 auto 32px; line-height:1.6; position:relative; }
.hero-stats { display:flex; justify-content:center; gap:32px; margin-bottom:32px; position:relative; }
.hero-stat { text-align:center; }
.hero-stat-num { font-size:28px; font-weight:700; background:var(--gradient-hero); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.hero-stat-label { font-size:12px; color:var(--text-muted); margin-top:2px; }

/* Search */
/* Search (aligned to categories row) */
.search-wrap{
  max-width:1400px;
  margin:0 auto;
  padding:0 24px;           /* align with categories row */
  display:flex;
  gap:10px;
  align-items:stretch;
  justify-content:center;   /* center as a group */
}
.search-field{ position:relative; flex:0 1 56.25%; min-width:260px; }
.search-confirm{
  display:flex; align-items:center; justify-content:center;
  padding:0 18px;
  border:1px solid var(--border);
  background:var(--bg-secondary);
  color:var(--text-secondary);
  border-radius:28px;
  font-size:13px;
  font-family:var(--font-main);
  cursor:pointer;
  transition:var(--transition);
  white-space:nowrap;
  font-weight:500;
  height:52px; /* visually matches input height */
}
.search-confirm:hover{ background:var(--surface); border-color:var(--border-hover); color:var(--text-primary); }
.search-confirm.active{ background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 4px 20px var(--accent-glow); }

.search-icon { position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:18px; pointer-events:none; }
.search-input { width:100%; padding:16px 20px 16px 48px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:16px; color:var(--text-primary); font-size:15px; font-family:var(--font-main); outline:none; transition:var(--transition); }
.search-input::placeholder { color:var(--text-muted); }
.search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); background:var(--bg-card); }

/* Categories */
.categories-wrap { max-width:1400px; margin:0 auto; padding:24px 24px 8px; overflow-x:auto; }
.categories-wrap::-webkit-scrollbar { display:none; }
.categories { display:flex; gap:10px; justify-content:center; flex-wrap:nowrap; }
.cat-btn { display:flex; align-items:center; gap:6px; padding:8px 18px; border:1px solid var(--border); background:var(--bg-secondary); color:var(--text-secondary); border-radius:28px; font-size:13px; font-family:var(--font-main); cursor:pointer; transition:var(--transition); white-space:nowrap; font-weight:500; }
.cat-btn:hover { background:var(--surface); border-color:var(--border-hover); color:var(--text-primary); }
.cat-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 4px 20px var(--accent-glow); }
.cat-count { font-size:11px; background:rgba(255,255,255,0.1); padding:1px 7px; border-radius:10px; }

/* Pagination (Front) */
.pager-wrap { max-width:1400px; margin:22px auto 64px; padding:0 24px; display:flex; justify-content:center; }
.pager { display:flex; align-items:center; gap:8px; flex-wrap:nowrap; }
.pager .pager-btn, .pager .pager-page {
  display:flex; align-items:center; justify-content:center;
  height:34px; padding:0 14px;
  border:1px solid var(--border);
  background:var(--bg-secondary);
  color:var(--text-secondary);
  border-radius:28px;
  font-size:13px; font-family:var(--font-main);
  cursor:pointer; transition:var(--transition);
  white-space:nowrap; font-weight:500;
}
.pager .pager-btn:hover, .pager .pager-page:hover { background:var(--surface); border-color:var(--border-hover); color:var(--text-primary); }
.pager .pager-page.active { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 4px 20px var(--accent-glow); }
.pager .pager-btn:disabled { opacity:0.35; cursor:not-allowed; }
.pager-sep { color:var(--text-muted); margin:0 2px; }
.pager-jump { display:flex; align-items:center; gap:8px; }
.pager-jump input{
  height:34px; width:90px; padding:0 12px;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  border-radius:28px;
  color:var(--text-primary);
  outline:none;
}
.pager-jump input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); background:var(--bg-card); }
.pager-info{ color:var(--text-muted); font-size:12px; margin-left:4px; white-space:nowrap; }
@media (max-width: 720px){
  .pager { overflow-x:auto; padding-bottom:6px; }
  .pager::-webkit-scrollbar{ display:none; }
}
.cat-btn.active .cat-count { background:rgba(255,255,255,0.25); }
@media (max-width: 900px){
  .categories-wrap{ overflow-x:auto; }
  .categories{ justify-content:flex-start; flex-wrap:nowrap; }
}

/* Masonry */
.masonry-section { max-width:1400px; margin:0 auto; padding:24px; }
.masonry-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.masonry-count { font-size:14px; color:var(--text-muted); }
.masonry-grid { display:flex; gap:20px; }
.masonry-col { flex:1; display:flex; flex-direction:column; gap:20px; }

/* Prompt Card */
.prompt-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:var(--transition); animation:fadeUp 0.5s ease both; }
.prompt-card:hover { border-color:var(--border-hover); transform:translateY(-4px); box-shadow:0 20px 60px rgba(0,0,0,0.4); }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.card-image-wrap { position:relative; overflow:hidden; background:var(--bg-secondary); }
.card-skeleton { position:absolute; inset:0; background:linear-gradient(90deg,var(--bg-secondary) 25%,var(--surface) 50%,var(--bg-secondary) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; min-height:200px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.card-image-wrap img { width:100%; display:block; transition:transform 0.5s ease, opacity 0.4s ease; }
.prompt-card:hover .card-image-wrap img { transform:scale(1.05); }
.card-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 50%); display:flex; flex-direction:column; justify-content:flex-end; padding:16px; opacity:0; transition:opacity 0.3s ease; }
.prompt-card:hover .card-overlay { opacity:1; }
.card-model { font-size:11px; background:rgba(108,92,231,0.6); backdrop-filter:blur(8px); color:#fff; padding:3px 10px; border-radius:12px; align-self:flex-start; margin-bottom:8px; font-weight:500; }
.card-copy-btn { background:rgba(255,255,255,0.12); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.2); color:#fff; padding:8px 16px; border-radius:10px; font-size:12px; font-family:var(--font-main); cursor:pointer; transition:var(--transition); font-weight:500; }
.card-copy-btn:hover { background:var(--accent); border-color:var(--accent); }
.card-info { padding:14px 16px 16px; }
.card-info h3 { font-size:14px; font-weight:600; margin-bottom:8px; line-height:1.3; }
.card-tags { display:flex; flex-wrap:wrap; gap:6px; }
.tag { font-size:11px; color:var(--accent2); background:var(--accent2-glow); padding:2px 8px; border-radius:6px; font-weight:500; }
.no-results { text-align:center; padding:80px 24px; color:var(--text-muted); font-size:16px; }
.no-results-icon { font-size:48px; margin-bottom:16px; display:block; }


.card-showcase-btn{
  position:absolute; left:14px; bottom:14px;
  padding:8px 10px; border-radius:10px;
  background:rgba(10,10,15,0.55);
  border:1px solid rgba(255,255,255,0.10);
  color:var(--text-primary); font-size:12px; font-weight:600;
  backdrop-filter: blur(10px);
  transition: var(--transition);
}
.card-showcase-btn:hover{ background:rgba(10,10,15,0.75); transform: translateY(-1px); }

.preview-wrap{ position:relative; display:inline-block; }
.preview-nav{ position:absolute; left:10px; right:10px; bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
.preview-nav-btn{ width:34px; height:34px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(10,10,15,0.5); color:var(--text-primary); cursor:pointer; }
.preview-nav-btn:hover{ background:rgba(10,10,15,0.7); }
.preview-nav-indicator{ font-size:12px; color:var(--text-primary); background:rgba(10,10,15,0.5); border:1px solid rgba(255,255,255,0.12); padding:6px 10px; border-radius:999px; }

.modal-image-wrap{ position:relative; width:100%; height:100%; }
.modal-image-nav{ position:absolute; left:12px; right:12px; bottom:12px; display:flex; justify-content:space-between; align-items:center; gap:10px; pointer-events:none; z-index:5; }
.modal-image-nav .modal-image-nav-btn, .modal-image-nav .modal-image-nav-ind, .modal-image-nav .modal-nav-btn, .modal-image-nav .modal-nav-indicator{ pointer-events:auto; }
.modal-image-nav-btn, .modal-nav-btn{ width:38px; height:38px; border-radius:12px; border:1px solid rgba(255,255,255,0.14); background:rgba(10,10,15,0.45); color:var(--text-primary); cursor:pointer; }
.modal-nav-btn:hover{ background:rgba(10,10,15,0.7); }
.modal-nav-indicator{ font-size:12px; color:var(--text-primary); background:rgba(10,10,15,0.45); border:1px solid rgba(255,255,255,0.14); padding:6px 10px; border-radius:999px; }
.modal-copy-row{ display:flex; gap:10px; justify-content:flex-start; flex-wrap:wrap; margin:10px 0 10px; }
.modal-copy-btn.small{ padding:10px 12px; border-radius:12px; font-size:13px; }

/* Modal */
.modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(12px); z-index:200; display:flex; align-items:center; justify-content:center; padding:24px; animation:fadeIn 0.2s ease; }
.modal-backdrop.hidden { display:none; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal-content { background:var(--bg-card); border:1px solid var(--border); border-radius:20px; max-width:900px; width:100%; max-height:90vh; overflow-y:auto; position:relative; animation:slideUp 0.3s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
.modal-close { position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.1); border:none; color:var(--text-secondary); width:36px; height:36px; border-radius:50%; font-size:16px; cursor:pointer; z-index:10; transition:var(--transition); }
.modal-close:hover { background:rgba(255,255,255,0.2); color:#fff; }
.modal-grid { display:grid; grid-template-columns:1fr 1fr; }
.modal-image { overflow:hidden; border-radius:20px 0 0 20px; }
.modal-image img { width:100%; height:100%; object-fit:cover; display:block; }
.modal-details { padding:20px; display:flex; flex-direction:column; gap:10px; }
.modal-details h2 { margin:0; font-size:22px; font-weight:700; line-height:1.2; }
.modal-model { font-size:13px; color:var(--text-secondary); }
.modal-model .label { color:var(--text-muted); }
.modal-prompt-text { background:var(--bg-secondary); border:1px solid var(--border); border-radius:12px; padding:16px; font-size:13px; line-height:1.7; color:var(--text-secondary); max-height:200px; overflow-y:auto; }
.modal-prompt-text::-webkit-scrollbar { width:4px; }
.modal-prompt-text::-webkit-scrollbar-thumb { background:var(--text-muted); border-radius:2px; }
.modal-prompt-area{
  width:100%;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  font-size:13px;
  line-height:1.7;
  color:var(--text-secondary);
  max-height:200px;
  overflow-y:auto;
  resize:vertical;
  font-family:var(--font-main);
}
.modal-prompt-area::-webkit-scrollbar{ width:4px; }
.modal-prompt-area::-webkit-scrollbar-thumb{ background:var(--text-muted); border-radius:2px; }
.modal-field-label{ font-size:12px; color:var(--text-muted); margin-top:6px; }

.modal-copy-btn { background:var(--accent); border:none; color:#fff; padding:12px 24px; border-radius:12px; font-size:14px; font-family:var(--font-main); font-weight:600; cursor:pointer; transition:var(--transition); box-shadow:0 4px 20px var(--accent-glow); }
.modal-copy-btn:hover { transform:translateY(-1px); box-shadow:0 8px 30px var(--accent-glow); }
.modal-tags { display:flex; flex-wrap:wrap; align-items:center; gap:8px; font-size:13px; }
.modal-tags .label { color:var(--text-muted); }

/* Footer */
.footer { text-align:center; padding:48px 24px; border-top:1px solid var(--border); margin-top:48px; }
.footer-brand { font-size:24px; font-weight:700; background:var(--gradient-hero); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
.footer p { color:var(--text-muted); font-size:13px; }
.footer-links { display:flex; justify-content:center; gap:20px; margin-top:16px; }
.footer-links a { color:var(--text-secondary); text-decoration:none; font-size:13px; transition:var(--transition); }
.footer-links a:hover { color:var(--accent); }

/* Scrollbar */
::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-track { background:var(--bg-primary); }
::-webkit-scrollbar-thumb { background:var(--surface); border-radius:4px; }

/* ══════ ADMIN PAGE STYLES ══════ */
.admin-wrapper { max-width:1200px; margin:0 auto; padding:24px; }

/* Admin Header */
.admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; padding-bottom:20px; border-bottom:1px solid var(--border); }
.admin-header-left { display:flex; align-items:center; gap:16px; }
.admin-back-btn { display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); color:var(--text-secondary); padding:8px 16px; border-radius:10px; font-size:13px; font-family:var(--font-main); cursor:pointer; transition:var(--transition); }
.admin-back-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.admin-header h1 { font-size:24px; font-weight:700; }
.admin-header h1 span { background:var(--gradient-hero); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

.admin-header-right { display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }

.admin-ghost-btn{
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
  color:var(--text-primary);
  font-weight:600;
  cursor:pointer;
  transition:transform .12s ease, background .12s ease, border-color .12s ease;
}
.admin-ghost-btn:hover{ background:rgba(255,255,255,.07); border-color:rgba(255,255,255,.22); transform:translateY(-1px); }
.admin-ghost-btn:active{ transform:translateY(0); }

.admin-add-btn { display:flex; align-items:center; gap:6px; background:var(--success); border:none; color:#fff; padding:10px 20px; border-radius:10px; font-size:14px; font-family:var(--font-main); font-weight:600; cursor:pointer; transition:var(--transition); }
.admin-add-btn:hover { opacity:0.9; transform:translateY(-1px); }

/* Admin Stats */
.admin-stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:12px; margin-bottom:24px; }
.admin-stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:16px; text-align:center; }
.admin-stat-card .num { font-size:24px; font-weight:700; background:var(--gradient-hero); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.admin-stat-card .lbl { font-size:11px; color:var(--text-muted); margin-top:4px; }

/* Admin Search & Filter */
.admin-toolbar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.admin-search { flex:1; min-width:200px; padding:10px 16px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:10px; color:var(--text-primary); font-size:14px; font-family:var(--font-main); outline:none; transition:var(--transition); }
.admin-confirm{
  display:flex; align-items:center; justify-content:center;
  padding:0 18px;
  border:1px solid var(--border);
  background:var(--bg-secondary);
  color:var(--text-secondary);
  border-radius:28px;
  font-size:13px;
  font-family:var(--font-main);
  cursor:pointer;
  transition:var(--transition);
  white-space:nowrap;
  font-weight:500;
  height:42px;
}
.admin-confirm:hover{ background:var(--surface); border-color:var(--border-hover); color:var(--text-primary); }
.admin-confirm.active{ background:var(--accent); border-color:rgba(255,255,255,0.18); color:#fff; box-shadow:0 8px 24px rgba(124,92,255,0.24); }

/* Admin config modals spacing: unify vertical rhythm to 10px */
.cfg-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px; }
.cfg-head .edit-modal-sub{ margin-top:10px; line-height:1.45; }
.cfg-body .form-row{ margin-top:10px; }
.cfg-body .admin-grid{ gap:10px !important; }
.cfg-body .admin-card{ padding:14px !important; }
.cfg-body .seg{ margin-left:10px; }

.admin-search:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-glow); }
.admin-filter { padding:10px 16px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:10px; color:var(--text-primary); font-size:13px; font-family:var(--font-main); cursor:pointer; outline:none; }
.admin-filter option { background:var(--bg-secondary); color:var(--text-primary); }

/* Admin Table */

.edit-modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(12px); z-index:300; display:flex; align-items:center; justify-content:center; padding:24px; }

.form-group label { font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
.form-group input, .form-group select, .form-group textarea { padding:10px 14px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:10px; color:var(--text-primary); font-size:14px; font-family:var(--font-main); outline:none; transition:var(--transition); }

.form-preview { margin-top:16px; padding:16px; background:var(--bg-secondary); border-radius:12px; border:1px solid var(--border); }

function normalizePromptFields(p) {
  // Backward compatible: older data uses `prompt`
  const out = { ...p };
  if (typeof out.promptEn !== "string" && typeof out.promptZh !== "string") {
    out.promptEn = (typeof out.prompt === "string") ? out.prompt : "";
    out.promptZh = "";
  } else {
    out.promptEn = (typeof out.promptEn === "string") ? out.promptEn : ((typeof out.prompt === "string") ? out.prompt : "");
    out.promptZh = (typeof out.promptZh === "string") ? out.promptZh : "";
  }
  // Keep legacy `prompt` for compatibility with existing code paths (we'll stop using it in UI)
  out.prompt = out.promptEn || out.promptZh || out.prompt || "";
  return out;
}

function getPromptByLang(p, lang) {
  const pp = normalizePromptFields(p);
  if (lang === "zh") return (pp.promptZh || pp.promptEn || "");
  return (pp.promptEn || pp.promptZh || "");
}

function parseImageList(raw) {
  if (!raw) return [];
  // allow comma, newline, semicolon, pipe
  return raw.split(/[,\n;|]+/).map(s=>s.trim()).filter(Boolean);
}
function getImages(p) {
  if (!p) return [];
  if (Array.isArray(p.images) && p.images.length) return p.images;
  const raw = (p.image || '').trim();
  return parseImageList(raw) || (raw ? [raw] : []);
}


function getShowcaseButtons(p){
  if(!p) return [];

  }
  const legacy = (p.showcase || p.showcaseUrl || '').trim();
  return legacy ? [{label:'作品展示', url: legacy}] : [];
}
function renderShowcaseInline(p, actionsOnly=false){

  if (!btns.length) return "";

}

}

function loadPrompts() {
  try {
    let savedRaw = localStorage.getItem(STORAGE_KEY);
    if (!savedRaw) {
      for (const k of LEGACY_STORAGE_KEYS) {
        const v = localStorage.getItem(k);
        if (v) { savedRaw = v; break; }
      }
    }
    if (savedRaw) {
      const parsed = JSON.parse(savedRaw);
      // Legacy format: saved as an array directly
      if (Array.isArray(parsed)) {
        // Embedded data is authoritative (supports "sync to code" via exported HTML)
        const embedded = JSON.parse(JSON.stringify(DEFAULT_PROMPTS));
        savePrompts(embedded);
        return embedded.map(normalizePromptFields);
      }
      // New format: { version, data }
      if (parsed && typeof parsed === "object" && Array.isArray(parsed.data)) {
        if ((parsed.version || 0) >= (EMBEDDED_VERSION || 0)) return parsed.data.map(normalizePromptFields);
        const embedded = JSON.parse(JSON.stringify(DEFAULT_PROMPTS));
        savePrompts(embedded);
        return embedded.map(normalizePromptFields);
      }
    }
  } catch (e) {}
  return JSON.parse(JSON.stringify(DEFAULT_PROMPTS)).map(normalizePromptFields);
}

function savePrompts(data) {
  // Store with version so exported HTML can override older localStorage data
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: EMBEDDED_VERSION, data }));
}

function downloadBlob(filename, content, mime="application/octet-stream") {
  const blob = new Blob([content], { type: mime });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1500);
}

function exportPromptsJSON() {
  const payload = { version: EMBEDDED_VERSION, exportedAt: Date.now(), data: prompts };
  downloadBlob("aiwind_prompts_data.json", JSON.stringify(payload, null, 2), "application/json;charset=utf-8");
  toast("✅ 已导出 JSON：aiwind_prompts_data.json");
}

function exportFullHTML() {
  // Export a self-contained HTML with current prompts embedded into DEFAULT_PROMPTS + bumped EMBEDDED_VERSION
  const nowVer = Date.now();
  const serialized = JSON.stringify(prompts, null, 2);

  let src = document.documentElement.outerHTML;

  // Ensure DOCTYPE exists (outerHTML doesn't include it in some browsers)
  if (!src.toLowerCase().startsWith("<!doctype")) src = "<!DOCTYPE html>\n" + src;

  // Replace embedded version
  src = src.replace(/const\s+EMBEDDED_VERSION\s*=\s*\d+\s*;/, `const EMBEDDED_VERSION = ${nowVer};`);

  // Replace DEFAULT_PROMPTS array block (non-greedy)
  src = src.replace(/const\s+DEFAULT_PROMPTS\s*=\s*\[[\s\S]*?\n\];/, `const DEFAULT_PROMPTS = ${serialized};`);

  downloadBlob("aiwindV2.html", src, "text/html;charset=utf-8");
  toast("✅ 已导出 HTML：aiwindV2.html（包含最新内容）");
}

function onImportJSONFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(String(reader.result || ""));
      const data = Array.isArray(parsed) ? parsed : (parsed && parsed.data ? parsed.data : null);
      if (!Array.isArray(data)) throw new Error("JSON 格式不正确：需要数组或 {data:[...]}");
      // Ensure timestamps exist (for scheme v2 sorting)
      const now = Date.now();
      prompts = data.map((p,i)=> {
        const base = normalizePromptFields(p);
        return {
          ...base,
          id: (typeof base.id === "number") ? base.id : i,
          createdAt: base.createdAt || base.updatedAt || now,
          updatedAt: base.updatedAt || base.createdAt || now
        };
      });
      savePrompts(prompts);
      renderFront(); renderAdmin();
      toast("✅ 导入成功：内容已覆盖并保存");
    } catch (e) {
      console.error(e);
      toast("❌ 导入失败：" + (e && e.message ? e.message : "未知错误"));
    }
  };
  reader.readAsText(file, "utf-8");
}

function buildMasonry(items, n) {
  const cols=Array.from({length:n},()=>[]), h=new Array(n).fill(0);
  items.forEach(item => {
    const s=h.indexOf(Math.min(...h));
    cols[s].push(item);
    h[s]+=(parseInt(item.image.split("/").pop())||400)+80;
  });
  return cols;
}

// Render / update only the modal area to avoid "page refresh" feeling
function updateModal() {
  const backdrop = document.getElementById('modalBackdrop');
  const content = document.getElementById('modalContent');
  if(!backdrop || !content) return;

  const sp = state.selectedPrompt;
  if(!sp){
    backdrop.classList.add('hidden');
    content.innerHTML = '';
    return;
  }

  const imgs = getImages(sp);
  if(!Number.isInteger(state.modalImgIndex)) state.modalImgIndex = 0;
  if(state.modalImgIndex < 0) state.modalImgIndex = 0;
  if(state.modalImgIndex >= imgs.length) state.modalImgIndex = 0;

  const curImg = imgs[state.modalImgIndex] || imgs[0] || '';
  content.innerHTML = renderModalInner(sp, curImg, imgs.length, state.modalImgIndex);

  backdrop.classList.remove('hidden');
}

function renderPager(totalItems, pageSize, totalPages){
  if(totalItems<=pageSize) return '';
  const cur = state.pageIndex || 1;
  const pages = [];
  for(let p=totalPages;p>=1;p--) pages.push(p); // descending display (2,1,...)
  return `
    <div class="pager-wrap">
      <div class="pager" role="navigation" aria-label="Pagination">
        <button class="pager-btn" onclick="gotoPage(1)" ${cur===1?'disabled':''}>首页</button>
        <button class="pager-btn" onclick="gotoPage(${cur-1})" ${cur<=1?'disabled':''}>上一页</button>
        ${pages.map(p=>`<button class="pager-page ${p===cur?'active':''}" onclick="gotoPage(${p})">${p}</button>`).join('')}
        <button class="pager-btn" onclick="gotoPage(${cur+1})" ${cur>=totalPages?'disabled':''}>下一页</button>
        <button class="pager-btn" onclick="gotoPage(${totalPages})" ${cur===totalPages?'disabled':''}>末页</button>
        <span class="pager-sep">|</span>
        <div class="pager-jump">
          <input type="number" min="1" max="${totalPages}" placeholder="页码" onkeydown="if(event.key==='Enter'){gotoPage(parseInt(this.value||'1',10));}">
          <button class="pager-btn" onclick="gotoPage(parseInt(this.previousElementSibling.value||'1',10))">跳转</button>
        </div>
        <span class="pager-info">共 ${totalPages} 页 / ${totalItems} 条</span>
      </div>
    </div>
  `;
}

function gotoPage(p){
  const filtered = getFiltered();
  const pageSize = state.pageSize || 50;
  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  let page = Number(p)||1;
  if(page<1) page=1;
  if(page>totalPages) page=totalPages;
  state.pageIndex = page;
  renderFront();
  window.scrollTo({top:0, behavior:'smooth'});
}

function getAdminFiltered() {
  return prompts
    .filter(p => {
      const mc = state.adminFilter==="all" || p.category===state.adminFilter;
      const q = state.adminSearch.toLowerCase();
      const ms = !q || p.title.toLowerCase().includes(q) || p.titleZh.includes(q) || String(p.id).includes(q) || p.tags.some(t=>t.toLowerCase().includes(q));
      return mc && ms;
    })
    // ✅ 后台也按最近更新倒序展示
    .sort((a,b) => ((b.updatedAt||b.createdAt||b.id||0) - (a.updatedAt||a.createdAt||a.id||0)));
}

function openEditModal(id) {
  if (id === null) {
    state.editingPrompt = { id:null, title:"", titleZh:"", category:"anime", tags:[], promptEn:"", promptZh:"", prompt:"", image:"", images:[], model:"Midjourney v6", showcaseButtons:[] };
  } else {
    const p = prompts.find(x=>x.id===id);
    state.editingPrompt = JSON.parse(JSON.stringify(p));
    // Legacy migrations
    if (!state.editingPrompt.images || !Array.isArray(state.editingPrompt.images)) {
      state.editingPrompt.images = getImages(state.editingPrompt);
    }
    if (!state.editingPrompt.showcaseButtons || !Array.isArray(state.editingPrompt.showcaseButtons)) {
      state.editingPrompt.showcaseButtons = [];
      const legacy = state.editingPrompt.showcase || state.editingPrompt.showcaseUrl || "";
      if (legacy) state.editingPrompt.showcaseButtons.push({ label: "作品展示", url: legacy });
    }
  }
  renderEditModal();
  document.getElementById('editModalBackdrop').classList.remove('hidden');
}

function hydrateShowcaseButtons(p){
  const wrap = document.getElementById('edit_showcase_list');
  if(!wrap) return;
  wrap.innerHTML = '';
  const arr = (p.showcaseButtons && Array.isArray(p.showcaseButtons)) ? p.showcaseButtons : [];
  if(arr.length===0){
    // legacy: show one row if old field exists
    const legacy = p.showcase || p.showcaseUrl || '';
    if(legacy) addShowcaseBtnRow('作品展示', legacy);
    return;
  }
  arr.forEach(b=>addShowcaseBtnRow(b.label||'作品展示', b.url||''));
}

function addShowcaseBtnRow(label,url){
  const wrap = document.getElementById('edit_showcase_list');
  if(!wrap) return;
  const row = document.createElement('div');
  row.className = 'btnrow';
  row.innerHTML = `
    <input type="text" class="sb_label" placeholder="按钮名称（如：作品展示）" value="${escHtml(label||'')}">
    <input type="text" class="sb_url" placeholder="跳转链接（https://...）" value="${escHtml(url||'')}">
    <button class="btnrow-remove" type="button" title="删除" onclick="this.closest('.btnrow').remove()">删除</button>
  `;
  wrap.appendChild(row);
}

  const raw = (document.getElementById('edit_image')?.value || '').trim();

    return;

  preview.innerHTML = `

    <div class="thumb-strip">

function saveEdit() {
  const title = document.getElementById('edit_title').value.trim();
  const titleZh = document.getElementById('edit_titleZh').value.trim();
  const category = document.getElementById('edit_category').value;
  const model = document.getElementById('edit_model').value;
  const tagsStr = document.getElementById('edit_tags').value;
  const imageRaw = document.getElementById('edit_image').value.trim();
  const images = parseImageList(imageRaw);
  const image = images[0] || '';
  const showcaseButtons = Array.from(document.querySelectorAll('#edit_showcase_list .btnrow')).map(row=>{
    const label = (row.querySelector('.sb_label')?.value || '').trim();
    const url = (row.querySelector('.sb_url')?.value || '').trim();
    return { label: label || '作品展示', url };
  }).filter(b=>b.url);
  const showcase = showcaseButtons[0]?.url || '';
  const promptEn = document.getElementById('edit_promptEn').value.trim();
  const promptZh = document.getElementById('edit_promptZh').value.trim();
  const prompt = promptEn || promptZh; // legacy fallback

  if (!title && !titleZh) { showToast("请至少填写一个标题", "error"); return; }
  if (!promptEn && !promptZh) { showToast("请至少填写一个提示词（英文或中文）", "error"); return; }

  const tags = tagsStr.split(',').map(t=>t.trim()).filter(t=>t);
  const now = Date.now();

  if (state.editingPrompt.id === null) {
    // New
    const newPrompt = { id:getNextId(prompts), title:title||titleZh, titleZh:titleZh||title, category, model, tags, image, images, showcase, showcaseButtons, promptEn, promptZh, prompt: (promptEn || promptZh), createdAt: now, updatedAt: now };
    prompts.push(newPrompt);
    showToast("✓ 新增成功！ID: " + newPrompt.id);
  } else {
    // Edit
    const idx = prompts.findIndex(p=>p.id===state.editingPrompt.id);
    if (idx>=0) {
      prompts[idx] = { ...prompts[idx], title:title||titleZh, titleZh:titleZh||title, category, model, tags, image, images, showcase, showcaseButtons, promptEn, promptZh, prompt: (promptEn || promptZh), createdAt: prompts[idx].createdAt || now, updatedAt: now };
      showToast("✓ 保存成功！");
    }
  }

  savePrompts(prompts);
  closeEditModal();
  renderAdmin();
}

function deletePrompt(id) {
  const p = prompts.find(x=>x.id===id);
  if (!p) return;
  if (!confirm(`确定要删除这条提示词吗？\n\nID: ${p.id}\n标题: ${p.titleZh || p.title}`)) return;
  prompts = prompts.filter(x=>x.id!==id);
  savePrompts(prompts);
  showToast("✓ 已删除");
  renderAdmin();
}

// ══════ GLOBAL EVENTS ══════
window.addEventListener('resize', () => {
  if (state.currentPage==='front') renderFront();
});
document.addEventListener('keydown', e => {
  if (e.key==='Escape') {
    if (state.editingPrompt) closeEditModal();
    else if (state.selectedPrompt) closeModal();
  }
});

// ══════ INIT ══════
renderFront();

// ══════ INFO BUTTONS CONFIG (Admin) ══════

function openHomeConfig(){
  const backdrop = document.getElementById('homeCfgBackdrop');
  const content = document.getElementById('homeCfgContent');
  if(!backdrop || !content) return;

  if(!settings.homeCfg) settings.homeCfg = {};
  if(!settings.homeCfg.zh) settings.homeCfg.zh = {};
  if(!settings.homeCfg.en) settings.homeCfg.en = {};

  let tab = state.lang || 'zh'; // default current language
  const draft = JSON.parse(JSON.stringify(settings.homeCfg));

  function render(){
    const hc = draft;
    const l = hc[tab] || {};
    content.innerHTML = `
      <div class="edit-modal-head cfg-head">
        <div>
          <div class="edit-modal-title">首页配置</div>
          <div class="edit-modal-sub">可修改左上角品牌名/图标，以及首页大标题与描述文案（支持中英文分别配置）。</div>
        </div>
        <button class="modal-close" onclick="closeHomeConfig()">✕</button>
      </div>

      <div class="edit-modal-body cfg-body">
        <div class="admin-grid" style="grid-template-columns:1fr; gap:10px;">
          <div class="admin-card" style="padding:16px;">
            <div style="display:flex; gap:10px; align-items:center; justify-content:space-between;">
              <div style="font-weight:700;">品牌信息</div>
              <div class="seg">
                <button class="seg-btn ${tab==='zh'?'active':''}" onclick="homeCfgSetTab('zh')">中文</button>
                <button class="seg-btn ${tab==='en'?'active':''}" onclick="homeCfgSetTab('en')">EN</button>
              </div>
            </div>

            <div class="form-row" style="margin-top:10px;">
              <label>网站名称</label>
              <input class="input" value="${escHtml(hc.siteName||'ZrhAi')}" maxlength="40" oninput="homeCfgSet('siteName',this.value)">
            </div>

            <div class="form-row">
              <label>左上角图标文字</label>
              <input class="input" value="${escHtml(hc.logoText||'Ai')}" maxlength="10" oninput="homeCfgSet('logoText',this.value)">
            </div>

            <div class="form-row">
              <label>左上角图标图片</label>
              <input class="input" value="${escHtml(hc.logoImage||'')}" placeholder="https://... 或 assets/img/..." oninput="homeCfgSet('logoImage',this.value)">
            </div>

            <div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
              <div style="color:rgba(255,255,255,0.6); font-size:12px;">预览：</div>
              <div style="display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid rgba(255,255,255,0.08); border-radius:14px; background:rgba(255,255,255,0.03);">
                ${hc.logoImage?`<img src="${escHtml(hc.logoImage)}" style="width:28px;height:28px;border-radius:9px;object-fit:cover;" onerror="this.style.display='none'">`:`<div class="nav-logo" style="width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;">${escHtml(hc.logoText||'Ai')}</div>`}
                <div style="font-weight:700;">${escHtml(hc.siteName||'ZrhAi')}</div>
              </div>
            </div>
          </div>

          <div class="admin-card" style="padding:16px;">
            <div style="font-weight:700;">首页文案（${tab==='zh'?'中文':'EN'}）</div>

            <div class="form-row" style="margin-top:10px;">
              <label>大标题数字</label>
              <input class="input" value="${escHtml(l.heroCount||'')}" placeholder="例如：33+" maxlength="20" oninput="homeCfgSetLang('heroCount',this.value)">
            </div>

            <div class="form-row">
              <label>大标题文本</label>
              <input class="input" value="${escHtml(l.heroTitle||'')}" placeholder="例如：精选 AI 提示词" maxlength="60" oninput="homeCfgSetLang('heroTitle',this.value)">
            </div>

            <div class="form-row">
              <label>描述文案</label>
              <textarea class="textarea" rows="3" maxlength="1000" placeholder="例如：探索 700+ 精选 AI 提示词..." oninput="homeCfgSetLang('heroText',this.value)">${escHtml(l.heroText||'')}</textarea>
            </div>

            <div style="margin-top:10px; color:rgba(255,255,255,0.55); font-size:12px;">
              提示：留空则使用默认文案。
            </div>
          </div>
        </div>
      </div>

      <div class="edit-modal-foot cfg-foot">
        <button class="admin-ghost-btn" onclick="closeHomeConfig()">取消</button>
        <button class="admin-primary-btn" onclick="saveHomeConfig()">保存</button>
      </div>
    `;
  }

  window.homeCfgSetTab = function(v){ tab=v; render(); };
  window.homeCfgSet = function(key,val){ draft[key]=val; };
  window.homeCfgSetLang = function(key,val){
    if(!draft[tab]) draft[tab]={};
    draft[tab][key]=val;
  };
  window.saveHomeConfig = function(){
    // normalize
    if(!draft.zh) draft.zh={};
    if(!draft.en) draft.en={};
    settings.homeCfg = draft;
    saveSettings(settings);
    toast('✅ 首页配置已保存');
    if(state.currentPage==='front') renderFront();
    renderAdmin();
    closeHomeConfig();
  };

  render();
  backdrop.classList.remove('hidden');
}

function closeHomeConfig(){
  const backdrop = document.getElementById('homeCfgBackdrop');
  if(backdrop) backdrop.classList.add('hidden');
}


function openInfoButtonsConfig(){
  const backdrop = document.getElementById('infoCfgBackdrop');
  const content = document.getElementById('infoCfgContent');
  if(!backdrop || !content) return;

  const items = (settings.infoButtons || []).map(x => ({...x}));
  function render(){
    content.innerHTML = `
      <div class="edit-modal-head cfg-head">
        <div>
          <div class="edit-modal-title">配置按钮</div>
          <div class="edit-modal-sub">这些按钮会显示在首页右上角语言切换（EN）左侧。点击按钮会弹出一个窗口，可展示图片/文本/链接。可配置 0 个或多个。</div>
        </div>
        <button class="modal-close" onclick="closeInfoButtonsConfig()">✕</button>
      </div>

      <div class="edit-modal-body cfg-body">
        <div class="admin-grid" style="grid-template-columns:1fr; gap:10px;">
          ${items.length ? items.map((it,idx)=>`
            <div class="admin-card" style="padding:14px;">
              <div style="display:flex; gap:10px; align-items:center; justify-content:space-between;">
                <div style="font-weight:700;">按钮 #${idx+1}</div>
                <div style="display:flex; gap:8px;">
                  <button class="admin-ghost-btn" onclick="infoCfgMove(${idx},-1)" ${idx===0?'disabled':''}>↑</button>
                  <button class="admin-ghost-btn" onclick="infoCfgMove(${idx},1)" ${idx===items.length-1?'disabled':''}>↓</button>
                  <button class="admin-danger-btn cfg-del" onclick="infoCfgDel(${idx})">删除</button>
                </div>
              </div>

              <div class="form-row" style="margin-top:10px;">
                <label>按钮名称</label>
                <input class="input" value="${escHtml(it.label)}" maxlength="40" oninput="infoCfgSet(${idx},'label',this.value)">
              </div>

              <div class="form-row">
                <label>图片链接（可选）</label>
                <input class="input" value="${escHtml(it.image)}" placeholder="https://... 或 assets/img/..." oninput="infoCfgSet(${idx},'image',this.value)">
              </div>

              <div class="form-row">
                <label>文本内容（可选）</label>
                <textarea class="textarea" rows="4" maxlength="10000" placeholder="可输入一段说明文字（支持 10000 字）" oninput="infoCfgSet(${idx},'text',this.value)">${escHtml(it.text)}</textarea>
              </div>

              <div class="form-row">
                <label>跳转链接（可选）</label>
                <input class="input" value="${escHtml(it.link)}" placeholder="https://..." oninput="infoCfgSet(${idx},'link',this.value)">
              </div>

              <div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
                <div style="color:rgba(255,255,255,0.6); font-size:12px;">预览：</div>
                <button class="info-nav-btn" onclick="previewInfoCfg(${idx})">${escHtml(it.label||('按钮#'+(idx+1)))}</button>
              </div>
            </div>
          `).join('') : `
            <div class="admin-card" style="padding:16px; color:rgba(255,255,255,0.65);">
              当前未配置任何按钮。点击下面的“添加按钮”即可新增。
            </div>
          `}
        </div>
      </div>

      <div class="edit-modal-foot cfg-foot">
        <button class="admin-ghost-btn" onclick="infoCfgAdd()">＋ 添加按钮</button>
        <button class="admin-ghost-btn" onclick="closeInfoButtonsConfig()">取消</button>
        <button class="admin-primary-btn" onclick="saveInfoButtonsConfig()">保存</button>
      </div>
    `;
  }

  // expose helpers on window for inline onclick
  window.infoCfgAdd = function(){
    items.push({ id:'btn_'+Math.random().toString(16).slice(2), label:'按钮', image:'', text:'', link:'' });
    render();
  };
  window.infoCfgDel = function(i){
    items.splice(i,1);
    render();
  };
  window.infoCfgMove = function(i,dir){
    const j = i + dir;
    if(j<0 || j>=items.length) return;
    const tmp = items[i]; items[i]=items[j]; items[j]=tmp;
    render();
  };
  window.infoCfgSet = function(i,key,val){
    items[i][key]=val;
  };
  window.previewInfoCfg = function(i){
    const it = items[i];
    // temp preview without saving
    const tmp = { infoButtons: items.map(x=>({...x})) };
    const old = settings;
    settings = tmp; // temporarily
    openInfoModal(it.id);
    settings = old;
  };
  window.saveInfoButtonsConfig = function(){
    // normalize + remove empty labels
    settings.infoButtons = items
      .filter(it => (it.label||'').trim().length>0)
      .map(it => ({
        id: it.id || ('btn_'+Math.random().toString(16).slice(2)),
        label: (it.label||'').trim(),
        image: (it.image||'').trim(),
        text: (it.text||''),
        link: (it.link||'').trim()
      }));
    saveSettings(settings);
    toast('✅ 配置已保存');
    // refresh front if active
    if(state.currentPage === 'front') renderFront();
    closeInfoButtonsConfig();
  };

  render();
  backdrop.classList.remove('hidden');
}

function closeInfoButtonsConfig(){
  const backdrop = document.getElementById('infoCfgBackdrop');
  if(backdrop) backdrop.classList.add('hidden');
}

</script>
